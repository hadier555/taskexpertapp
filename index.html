<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- 👇 HilltopAds Verification Meta Tag (آپ کی سائٹ کے لیے) -->
    <meta name="8dc20e3fa83491dd7f190cf86d0bd3d3e5668486" content="8dc20e3fa83491dd7f190cf86d0bd3d3e5668486" />
    
    <meta name="clckd" content="c124c5939d8a569ff3823b803fba763f" />
    <title>🎬 Video Ad Player</title>
    <style>
        /* سٹائل ویسے ہی ہیں جیسے پہلے تھے – میں نے مختصر کر دیا ہے */
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#0a0a0f; font-family:'Segoe UI', sans-serif; overflow:hidden; user-select:none; }
        #main { display:flex; flex-direction:column; width:100vw; height:100vh; background:#0a0a0f; }
        #ad-container { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; }
        #ad-container video { width:100%; height:100%; object-fit:contain; background:#000; }
        #play-btn { position:absolute; padding:20px 56px; font-size:28px; font-weight:700; background:linear-gradient(135deg,#f43f5e,#ec4899); color:#fff; border:none; border-radius:60px; cursor:pointer; box-shadow:0 0 40px rgba(236,72,153,0.5); z-index:20; transition:all 0.3s; text-transform:uppercase; }
        #play-btn:hover { transform:scale(1.05); }
        #loading { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:10; color:#fff; gap:16px; }
        #loading .spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,0.15); border-top-color:#ec4899; border-radius:50%; animation:spin 0.9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error-msg { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); color:#fbbf24; background:rgba(0,0,0,0.85); padding:14px 28px; border-radius:12px; font-size:15px; display:none; z-index:30; border:1px solid rgba(251,191,36,0.3); text-align:center; max-width:90%; backdrop-filter:blur(4px); }
        #retry-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:16px 44px; font-size:20px; font-weight:700; background:linear-gradient(135deg,#f43f5e,#ec4899); color:#fff; border:none; border-radius:50px; cursor:pointer; display:none; z-index:25; box-shadow:0 0 30px rgba(236,72,153,0.5); }
        .top-controls { position:absolute; top:24px; right:24px; display:none; align-items:center; gap:16px; background:rgba(0,0,0,0.7); padding:12px 20px; border-radius:50px; z-index:15; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); }
        .top-controls .ad-countdown { color:#e2e8f0; font-weight:500; font-size:16px; min-width:70px; text-align:center; }
        .top-controls .ad-skip-btn { padding:8px 24px; border-radius:40px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#f1f5f9; cursor:pointer; font-weight:600; font-size:16px; transition:all 0.2s; }
        .top-controls .ad-skip-btn:disabled { opacity:0.35; cursor:not-allowed; }
        .top-controls .sound-btn { padding:8px 12px; border-radius:40px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#f1f5f9; cursor:pointer; font-size:20px; min-width:44px; text-align:center; }
        .top-controls .btn-download-small { padding:8px 20px; border-radius:40px; border:none; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; font-weight:700; font-size:15px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; box-shadow:0 2px 12px rgba(34,197,94,0.3); }
        #bottom-bar { height:84px; min-height:84px; background:#111118; border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; padding:0 20px; }
        .btn-download-big { padding:14px 48px; border-radius:50px; border:none; font-size:18px; font-weight:700; cursor:pointer; text-decoration:none; display:none; align-items:center; gap:10px; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; box-shadow:0 6px 24px rgba(34,197,94,0.35); transition:all 0.25s; }
        #tracking-badge { position:absolute; bottom:80px; left:20px; color:#22c55e; font-size:13px; font-weight:600; background:rgba(0,0,0,0.75); padding:5px 14px; border-radius:30px; z-index:15; display:none; backdrop-filter:blur(4px); border:1px solid rgba(34,197,94,0.3); align-items:center; gap:6px; }
        #tracking-badge .dot { display:inline-block; width:8px; height:8px; background:#22c55e; border-radius:50%; animation:pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(0.7);} }
        #cache-badge { position:absolute; top:24px; left:24px; color:#60a5fa; font-size:12px; font-weight:600; background:rgba(0,0,0,0.75); padding:4px 14px; border-radius:30px; z-index:15; display:none; backdrop-filter:blur(4px); border:1px solid rgba(96,165,250,0.3); align-items:center; gap:6px; }
        @media (max-width:600px) { #play-btn { padding:16px 36px; font-size:22px; } .btn-download-big { padding:12px 32px; font-size:16px; } #bottom-bar { height:74px; min-height:74px; } .top-controls { top:16px; right:16px; padding:10px 16px; gap:12px; } }
    </style>
</head>
<body>
<div id="main">
    <div id="ad-container">
        <video id="ad-video" playsinline></video>
        <div id="loading"><div class="spinner"></div><span>Loading ad...</span></div>
        <button id="play-btn">▶ Play Ad</button>
        <button id="retry-btn">🔄 Retry</button>
        <div id="error-msg"></div>

        <div class="top-controls" id="top-controls">
            <span class="ad-countdown" id="ad-countdown">Ad · 0s</span>
            <button class="ad-skip-btn" id="ad-skip-btn" disabled>Skip ⏳</button>
            <button class="sound-btn" id="sound-btn">🔊</button>
            <a href="#" id="download-small" class="btn-download-small" target="_blank">⬇️ Download</a>
        </div>

        <div id="tracking-badge"><span class="dot"></span> Tracking Active</div>
        <div id="cache-badge"><span class="icon">💾</span> Cached</div>
    </div>

    <div id="bottom-bar">
        <a href="#" id="download-big" class="btn-download-big" target="_blank">⬇️ Download</a>
    </div>
</div>

<script>
    (function() {
        // ===== 🔥 اپنی ویڈیو کا لنک یہاں ڈالیں (VAST ہٹا دیا گیا ہے) =====
        const DIRECT_VIDEO_URL = 'https://www.w3schools.com/html/mov_bbb.mp4';  // مثال کے طور پر
        const DEFAULT_CTA = 'https://google.com';
        const SKIP_DELAY = 15;

        const video = document.getElementById('ad-video');
        const main = document.getElementById('main');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const topControls = document.getElementById('top-controls');
        const countdown = document.getElementById('ad-countdown');
        const skipBtn = document.getElementById('ad-skip-btn');
        const soundBtn = document.getElementById('sound-btn');
        const downloadSmall = document.getElementById('download-small');
        const downloadBig = document.getElementById('download-big');
        const trackingBadge = document.getElementById('tracking-badge');
        const cacheBadge = document.getElementById('cache-badge');

        let isAdPlaying = false;
        let skipInterval = null;
        let isMuted = false;

        video.muted = false;
        soundBtn.textContent = '🔊';

        function showError(msg, showRetry = false) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = '⚠️ ' + msg;
            retryBtn.style.display = showRetry ? 'block' : 'none';
        }
        function hideError() { errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }
        function showLoading(show) { loading.style.display = show ? 'flex' : 'none'; }
        function showControls(show) { topControls.style.display = show ? 'flex' : 'none'; }

        function toggleSound() { video.muted = !video.muted; isMuted = video.muted; soundBtn.textContent = isMuted ? '🔇' : '🔊'; }
        soundBtn.addEventListener('click', toggleSound);

        function resetPlayer() {
            isAdPlaying = false;
            clearInterval(skipInterval);
            video.pause();
            video.removeAttribute('src');
            video.load();
            showControls(false);
            skipBtn.disabled = true;
            skipBtn.textContent = 'Skip ⏳';
            countdown.textContent = 'Ad · 0s';
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Ad';
            hideError();
            showLoading(false);
            downloadSmall.style.display = 'none';
            downloadBig.style.display = 'none';
            trackingBadge.style.display = 'none';
            cacheBadge.style.display = 'none';
            video.muted = false;
            isMuted = false;
            soundBtn.textContent = '🔊';
        }

        function startSkipTimer() {
            let rem = SKIP_DELAY;
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip ⏳ ${rem}s`;
            countdown.textContent = `Ad · ${rem}s`;
            skipInterval = setInterval(() => {
                rem--;
                if (rem <= 0) {
                    clearInterval(skipInterval);
                    skipBtn.disabled = false;
                    skipBtn.textContent = 'Skip ▶';
                    countdown.textContent = 'Skip now';
                } else {
                    skipBtn.textContent = `Skip ⏳ ${rem}s`;
                    countdown.textContent = `Ad · ${rem}s`;
                }
            }, 1000);
        }

        function finishAd() {
            clearInterval(skipInterval);
            resetPlayer();
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Again';
        }

        skipBtn.addEventListener('click', () => { if (!skipBtn.disabled) finishAd(); });

        // 🚀 براہ راست ویڈیو چلائیں
        function playDirectVideo() {
            resetPlayer();
            hideError();
            showLoading(true);
            playBtn.style.display = 'none';

            video.src = DIRECT_VIDEO_URL;
            video.load();
            video.muted = false;
            isMuted = false;
            soundBtn.textContent = '🔊';

            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('✅ Video playing');
                    isAdPlaying = true;
                    showControls(true);
                    startSkipTimer();
                    trackingBadge.style.display = 'flex';
                    downloadSmall.href = DEFAULT_CTA;
                    downloadSmall.style.display = 'inline-flex';
                    downloadBig.href = DEFAULT_CTA;
                    downloadBig.style.display = 'inline-flex';
                    main.requestFullscreen().catch(() => {});
                }).catch(err => {
                    console.error('❌ Play error:', err);
                    showError('Tap to play', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                    playBtn.textContent = '▶ Tap to Play';
                });
            }

            video.onended = finishAd;
            video.onerror = function() {
                showError('Video error. Retry?', true);
                showLoading(false);
                playBtn.style.display = 'block';
            };
        }

        playBtn.addEventListener('click', playDirectVideo);
        retryBtn.addEventListener('click', playDirectVideo);

        resetPlayer();
        console.log('✅ براہ راست ویڈیو پلیئر تیار ہے (VAST ہٹا دیا گیا)');
    })();
</script>
</body>
</html>
