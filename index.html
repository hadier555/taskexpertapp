<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="clckd" content="c124c5939d8a569ff3823b803fba763f" />
    <title>🎬 VAST Ad Player</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#0a0a0f; font-family:'Segoe UI',sans-serif; overflow:hidden; user-select:none; }
        #main { display:flex; flex-direction:column; width:100vw; height:100vh; background:#0a0a0f; }
        #ad-container { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; flex-direction:column; }
        #ad-container video { width:100%; height:100%; object-fit:contain; background:#000; }
        
        /* ---- Debug Panel (on-screen console) ---- */
        #debug-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-size: 11px;
            font-family: monospace;
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 50;
            border: 1px solid #333;
            backdrop-filter: blur(4px);
            display: none;
            pointer-events: none;
            scroll-behavior: smooth;
        }
        #debug-panel .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #debug-panel .log-error { color: #f87171; }
        #debug-panel .log-success { color: #34d399; }
        #debug-panel .log-info { color: #60a5fa; }
        #debug-panel .log-warn { color: #fbbf24; }
        #debug-toggle {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 55;
            background: rgba(255,255,255,0.1);
            color: #aaa;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            cursor: pointer;
            pointer-events: auto;
        }
        #debug-toggle:hover { background: rgba(255,255,255,0.2); }

        #play-btn { position:absolute; padding:20px 56px; font-size:28px; font-weight:700; background:linear-gradient(135deg,#f43f5e,#ec4899); color:#fff; border:none; border-radius:60px; cursor:pointer; box-shadow:0 0 40px rgba(236,72,153,0.5); z-index:20; transition:0.3s; text-transform:uppercase; }
        #play-btn:hover { transform:scale(1.05); box-shadow:0 0 60px rgba(236,72,153,0.7); }
        #play-btn:active { transform:scale(0.95); }
        #loading { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:10; color:#fff; gap:16px; }
        #loading .spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,0.15); border-top-color:#ec4899; border-radius:50%; animation:spin 0.9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading span { font-size:16px; font-weight:300; color:#94a3b8; }
        #error-msg { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); color:#fbbf24; background:rgba(0,0,0,0.85); padding:14px 28px; border-radius:12px; font-size:15px; display:none; z-index:30; border:1px solid rgba(251,191,36,0.3); text-align:center; max-width:90%; backdrop-filter:blur(4px); }
        #retry-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:16px 44px; font-size:20px; font-weight:700; background:linear-gradient(135deg,#f43f5e,#ec4899); color:#fff; border:none; border-radius:50px; cursor:pointer; display:none; z-index:25; box-shadow:0 0 30px rgba(236,72,153,0.5); transition:0.3s; }
        #retry-btn:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(236,72,153,0.7); }
        .top-controls { position:absolute; top:24px; right:24px; display:none; align-items:center; gap:16px; background:rgba(0,0,0,0.7); padding:12px 20px; border-radius:50px; z-index:15; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); pointer-events:none; }
        .top-controls * { pointer-events:auto; }
        .top-controls .ad-countdown { color:#e2e8f0; font-weight:500; font-size:16px; min-width:70px; text-align:center; }
        .top-controls .ad-skip-btn { padding:8px 24px; border-radius:40px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#f1f5f9; cursor:pointer; font-weight:600; font-size:16px; transition:0.2s; }
        .top-controls .ad-skip-btn:disabled { opacity:0.35; cursor:not-allowed; }
        .top-controls .ad-skip-btn:hover:not(:disabled) { background:rgba(255,255,255,0.15); border-color:#fff; transform:scale(1.02); }
        .top-controls .sound-btn { padding:8px 12px; border-radius:40px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#f1f5f9; cursor:pointer; font-size:20px; transition:0.2s; min-width:44px; text-align:center; line-height:1; }
        .top-controls .sound-btn:hover { background:rgba(255,255,255,0.18); border-color:rgba(255,255,255,0.4); transform:scale(1.05); }
        .top-controls .btn-download-small { padding:8px 20px; border-radius:40px; border:none; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; font-weight:700; font-size:15px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:0.2s; box-shadow:0 2px 12px rgba(34,197,94,0.3); }
        .top-controls .btn-download-small:hover { transform:scale(1.05); box-shadow:0 4px 18px rgba(34,197,94,0.4); }
        #bottom-bar { height:84px; min-height:84px; background:#111118; border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; padding:0 20px; }
        .btn-download-big { padding:14px 48px; border-radius:50px; border:none; font-size:18px; font-weight:700; cursor:pointer; text-decoration:none; display:none; align-items:center; justify-content:center; gap:10px; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; box-shadow:0 6px 24px rgba(34,197,94,0.35); transition:0.25s ease; letter-spacing:0.5px; }
        .btn-download-big:hover { transform:scale(1.04); box-shadow:0 8px 32px rgba(34,197,94,0.5); background:linear-gradient(135deg,#2dd55e,#15803d); }
        .btn-download-big:active { transform:scale(0.95); }
        #tracking-badge { position:absolute; bottom:80px; left:20px; color:#22c55e; font-size:13px; font-weight:600; background:rgba(0,0,0,0.75); padding:5px 14px; border-radius:30px; z-index:15; display:none; backdrop-filter:blur(4px); border:1px solid rgba(34,197,94,0.3); align-items:center; gap:6px; }
        #tracking-badge .dot { display:inline-block; width:8px; height:8px; background:#22c55e; border-radius:50%; animation:pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
        @media (max-width:600px) { #play-btn { padding:16px 36px; font-size:22px; } .btn-download-big { padding:12px 32px; font-size:16px; } #bottom-bar { height:74px; min-height:74px; } .top-controls { top:16px; right:16px; padding:10px 16px; gap:12px; } .top-controls .ad-countdown { font-size:14px; min-width:60px; } .top-controls .ad-skip-btn { font-size:14px; padding:6px 18px; } .top-controls .btn-download-small { font-size:13px; padding:6px 14px; } .top-controls .sound-btn { font-size:17px; padding:6px 10px; min-width:36px; } #error-msg { font-size:13px; padding:10px 18px; bottom:100px; } #retry-btn { padding:12px 32px; font-size:17px; } #tracking-badge { bottom:70px; left:12px; font-size:11px; padding:4px 12px; } #debug-panel { font-size:10px; max-height:120px; } }
    </style>
</head>
<body>
<div id="main">
    <div id="ad-container">
        <video id="ad-video" playsinline></video>
        <div id="loading"><div class="spinner"></div><span>Loading ad...</span></div>
        <button id="play-btn">▶ Play Ad</button>
        <button id="retry-btn">🔄 Retry</button>
        <div id="error-msg"></div>
        <div class="top-controls" id="top-controls">
            <span class="ad-countdown" id="ad-countdown">Ad · 0s</span>
            <button class="ad-skip-btn" id="ad-skip-btn" disabled>Skip ⏳</button>
            <button class="sound-btn" id="sound-btn">🔊</button>
            <a href="#" id="download-small" class="btn-download-small" target="_blank">⬇️ Download</a>
        </div>
        <div id="tracking-badge"><span class="dot"></span> Tracking Active</div>
        
        <!-- 🔥 DEBUG PANEL (mobile-friendly) -->
        <div id="debug-panel"></div>
        <button id="debug-toggle">🐞 Show Debug</button>
    </div>
    <div id="bottom-bar">
        <a href="#" id="download-big" class="btn-download-big" target="_blank">⬇️ Download</a>
    </div>
</div>

<script>
    (function() {
        // ===== CONFIG =====
        const VAST_URL = 'https://difficultblock.com/dym.F/zvd/GGN/v/ZVGYUs/_e/m/9WueZYUflik/PPTRcTy/NbT/MPyaNATwcLtaNXzoIY1jMhzKIs2XMZQn';
        const DEFAULT_CTA = 'https://google.com';
        const SKIP_DELAY = 15;

        // ===== DOM =====
        const video = document.getElementById('ad-video');
        const main = document.getElementById('main');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const topControls = document.getElementById('top-controls');
        const countdown = document.getElementById('ad-countdown');
        const skipBtn = document.getElementById('ad-skip-btn');
        const soundBtn = document.getElementById('sound-btn');
        const downloadSmall = document.getElementById('download-small');
        const downloadBig = document.getElementById('download-big');
        const trackingBadge = document.getElementById('tracking-badge');
        const debugPanel = document.getElementById('debug-panel');
        const debugToggle = document.getElementById('debug-toggle');

        let isAdPlaying = false;
        let skipInterval = null;
        let currentClickUrl = '';
        let isMuted = false;
        let impressionUrls = [];
        let impressionsFired = false;

        // ===== DEBUG FUNCTION =====
        let debugVisible = false;
        function logToScreen(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log-line log-' + type;
            div.textContent = '> ' + msg;
            debugPanel.appendChild(div);
            debugPanel.scrollTop = debugPanel.scrollHeight;
            if (!debugVisible) {
                debugPanel.style.display = 'block';
                debugToggle.textContent = '🐞 Hide Debug';
                debugVisible = true;
            }
        }

        debugToggle.addEventListener('click', function() {
            if (debugVisible) {
                debugPanel.style.display = 'none';
                debugToggle.textContent = '🐞 Show Debug';
                debugVisible = false;
            } else {
                debugPanel.style.display = 'block';
                debugToggle.textContent = '🐞 Hide Debug';
                debugVisible = true;
            }
        });

        // ===== VIDEO & AUDIO =====
        video.muted = false;
        soundBtn.textContent = '🔊';

        function showError(msg, showRetry = false) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = '⚠️ ' + msg;
            retryBtn.style.display = showRetry ? 'block' : 'none';
            logToScreen('ERROR: ' + msg, 'error');
        }
        function hideError() {
            errorMsg.style.display = 'none';
            retryBtn.style.display = 'none';
        }
        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }
        function showControls(show) {
            topControls.style.display = show ? 'flex' : 'none';
        }

        function toggleSound() {
            video.muted = !video.muted;
            isMuted = video.muted;
            soundBtn.textContent = isMuted ? '🔇' : '🔊';
        }
        soundBtn.addEventListener('click', toggleSound);

        // ===== 🔥 IMPRESSION FIRE =====
        function fireImpressions() {
            if (impressionsFired) return;
            impressionsFired = true;

            const secureUrls = impressionUrls.map(url => url.replace(/^http:/, 'https:'));
            logToScreen('🔥 FIRING ' + secureUrls.length + ' IMPRESSION(S)', 'success');
            trackingBadge.style.display = 'flex';

            secureUrls.forEach((url, index) => {
                if (url) {
                    logToScreen('  ➜ URL ' + (index+1) + ': ' + url.substring(0, 80) + '...', 'info');
                    new Image().src = url;
                    fetch(url, { mode: 'no-cors' }).catch(() => {});
                    if (navigator.sendBeacon) {
                        navigator.sendBeacon(url);
                    }
                }
            });
            logToScreen('✅ Impression requests sent! Check dashboard in 5-10 mins.', 'success');
        }

        function resetPlayer() {
            isAdPlaying = false;
            impressionsFired = false;
            impressionUrls = [];
            clearInterval(skipInterval);
            video.pause();
            video.removeAttribute('src');
            video.load();
            showControls(false);
            skipBtn.disabled = true;
            skipBtn.textContent = 'Skip ⏳';
            countdown.textContent = 'Ad · 0s';
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Ad';
            hideError();
            showLoading(false);
            downloadSmall.style.display = 'none';
            downloadBig.style.display = 'none';
            trackingBadge.style.display = 'none';
            video.muted = false;
            isMuted = false;
            soundBtn.textContent = '🔊';
            video.onplay = null;
            video.onerror = null;
            video.ontimeupdate = null;
            // Clear debug when resetting (keep last few lines)
            if (debugPanel.children.length > 30) {
                while (debugPanel.children.length > 20) {
                    debugPanel.removeChild(debugPanel.firstChild);
                }
            }
        }

        function parseVASTAndPlay(xmlString) {
            logToScreen('📄 Parsing VAST XML...', 'info');
            try {
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlString, 'text/xml');
                if (xml.querySelector('parsererror')) {
                    showError('Invalid XML', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                    logToScreen('❌ XML parse error', 'error');
                    return;
                }
                logToScreen('✅ VAST XML parsed successfully', 'success');

                // 1. Video URL
                const mediaFiles = xml.querySelectorAll('MediaFile');
                let videoUrl = null;
                for (let node of mediaFiles) {
                    const type = node.getAttribute('type') || '';
                    let url = node.textContent.trim();
                    if (!url) url = node.getAttribute('src') || node.getAttribute('url') || '';
                    if (url && (type.includes('mp4') || type.includes('video/mp4'))) {
                        videoUrl = url;
                        break;
                    }
                }
                if (!videoUrl) {
                    for (let node of mediaFiles) {
                        let url = node.textContent.trim();
                        if (!url) url = node.getAttribute('src') || node.getAttribute('url') || '';
                        if (url && (node.getAttribute('type') || '').includes('video')) {
                            videoUrl = url;
                            break;
                        }
                    }
                }
                if (!videoUrl) {
                    showError('No video URL found', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                    logToScreen('❌ No video URL in VAST', 'error');
                    return;
                }
                logToScreen('✅ Video URL found: ' + videoUrl.substring(0, 60) + '...', 'success');

                // 2. ClickThrough
                currentClickUrl = '';
                const clickNode = xml.querySelector('ClickThrough');
                if (clickNode) currentClickUrl = clickNode.textContent.trim();
                logToScreen('✅ ClickThrough URL found: ' + (currentClickUrl ? 'Yes' : 'No'), 'info');

                // 3. Impressions
                impressionUrls = [];
                const impressionNodes = xml.querySelectorAll('Impression');
                impressionNodes.forEach(node => {
                    const url = node.textContent.trim();
                    if (url) impressionUrls.push(url);
                });
                const inlineImp = xml.querySelector('InLine Impression');
                if (inlineImp) {
                    const url = inlineImp.textContent.trim();
                    if (url && !impressionUrls.includes(url)) impressionUrls.push(url);
                }
                logToScreen('✅ Found ' + impressionUrls.length + ' Impression URL(s)', 'success');
                if (impressionUrls.length > 0) {
                    logToScreen('  ➜ ' + impressionUrls[0].substring(0, 80) + '...', 'info');
                }

                impressionsFired = false;
                showLoading(false);

                // Load video
                video.src = videoUrl;
                video.muted = false;
                isMuted = false;
                soundBtn.textContent = '🔊';

                video.load();
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            logToScreen('▶ Video playing', 'success');
                            isAdPlaying = true;
                            showControls(true);
                            startSkipTimer();

                            let impressionTimeout = setTimeout(() => {
                                fireImpressions();
                            }, 1000);

                            video.ontimeupdate = function() {
                                if (video.currentTime >= 1 && !impressionsFired) {
                                    clearTimeout(impressionTimeout);
                                    fireImpressions();
                                    video.ontimeupdate = null;
                                }
                            };
                        })
                        .catch(err => {
                            logToScreen('❌ Play error: ' + err.message, 'error');
                            showError('Tap to play video', true);
                            showLoading(false);
                            playBtn.style.display = 'block';
                            playBtn.textContent = '▶ Tap to Play';
                            playBtn.onclick = function() {
                                video.play().catch(() => {});
                                playBtn.style.display = 'none';
                                showLoading(true);
                            };
                        });
                }

                video.onended = function() {
                    logToScreen('⏹ Video ended', 'info');
                    finishAd();
                };

                video.onerror = function() {
                    logToScreen('❌ Video error: ' + (video.error ? video.error.message : 'unknown'), 'error');
                    showError('Video error. Retry?', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                };

                const link = currentClickUrl || DEFAULT_CTA;
                downloadSmall.href = link;
                downloadSmall.style.display = 'inline-flex';
                downloadBig.href = link;
                downloadBig.style.display = 'inline-flex';

                playBtn.style.display = 'none';

                if (!document.fullscreenElement) {
                    main.requestFullscreen().catch(() => {});
                }

            } catch(e) {
                logToScreen('❌ Exception: ' + e.message, 'error');
                showError('Parse error: ' + e.message, true);
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        function fetchAndPlay() {
            resetPlayer();
            hideError();
            showLoading(true);
            playBtn.style.display = 'none';
            playBtn.onclick = null;
            logToScreen('🌐 Fetching VAST...', 'info');

            fetch(VAST_URL, { mode: 'cors' })
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.text();
                })
                .then(xml => {
                    logToScreen('✅ VAST fetched (' + xml.length + ' chars)', 'success');
                    parseVASTAndPlay(xml);
                })
                .catch(err => {
                    logToScreen('❌ Network error: ' + err.message, 'error');
                    showError('Network error: ' + err.message, true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                });
        }

        function startSkipTimer() {
            let rem = SKIP_DELAY;
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip ⏳ ${rem}s`;
            countdown.textContent = `Ad · ${rem}s`;
            skipInterval = setInterval(() => {
                rem--;
                if (rem <= 0) {
                    clearInterval(skipInterval);
                    skipBtn.disabled = false;
                    skipBtn.textContent = 'Skip ▶';
                    countdown.textContent = 'Skip now';
                } else {
                    skipBtn.textContent = `Skip ⏳ ${rem}s`;
                    countdown.textContent = `Ad · ${rem}s`;
                }
            }, 1000);
        }

        function finishAd() {
            clearInterval(skipInterval);
            resetPlayer();
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Again';
            logToScreen('✅ Ad finished. Play again?', 'info');
        }

        skipBtn.addEventListener('click', () => {
            if (skipBtn.disabled) return;
            finishAd();
        });

        playBtn.addEventListener('click', fetchAndPlay);
        retryBtn.addEventListener('click', fetchAndPlay);

        resetPlayer();
        logToScreen('🚀 Player ready! Press Play Ad.', 'success');
        logToScreen('📌 Debug panel will show what happens.', 'info');
    })();
</script>
</body>
</html>
